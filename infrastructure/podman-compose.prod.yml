version: "3.8"

services:
  db:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - mantis_data:/var/lib/postgresql/data
    networks:
      - mantis_backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ..
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    volumes:
      - ../app/datastore:/mantis/app/datastore:z
    networks:
      - mantis_backend
    ports:
      - "${WEB_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mantis_data:

networks:
  mantis_backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
