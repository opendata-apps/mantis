version: "3.8"

# Dev override: mounts source for hot-reload, adds Vite watcher
# Usage: podman-compose -f podman-compose.prod.yml -f podman-compose.dev.yml up

services:
  web:
    # Mount source code for hot-reload (Flask debug mode)
    volumes:
      - ..:/mantis:z
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1

  vite:
    image: docker.io/oven/bun:1
    working_dir: /mantis
    command: ["sh", "-c", "bun install --network-concurrency 4 && bunx vite build --watch"]
    volumes:
      - ..:/mantis:z
    networks:
      - mantis_backend
    depends_on:
      - web
  db:
    ports:
      - "5431:5432"
