intro: >
  Die Europäische Gottesanbeterin hat auch Berlin erreicht. Als Teil der
  östlichen Population, die über Brandenburg in die Region gelangte, wird
  sie seit einigen Jahren zunehmend im Stadtgebiet beobachtet. Der
  städtische Wärmeinseleffekt und Berlins viele Brach- und Grünflächen
  bieten der wärmeliebenden Art gute Bedingungen.

sections:
  - heading: Gottesanbeterin in der Großstadt
    content: >
      <p>
      Dass eine Fangschrecke mitten in einer Millionenstadt leben kann,
      überrascht auf den ersten Blick. Doch Berlin bietet mit seinen
      zahlreichen Parks, Kleingärten, Brachflächen und urbanen
      Naturschutzgebieten ein Mosaik geeigneter Lebensräume. Die
      Durchschnittstemperaturen in der Stadt liegen durch den Wärmeinseleffekt
      mehrere Grad über dem Umland, was der kälteempfindlichen Art
      zugutekommt. Dokumentierte Vorkommen gibt es etwa auf dem Schöneberger
      Südgelände, einem ehemaligen Bahngelände, das heute als Natur-Park
      geschützt ist.
      </p>

  - heading: Verbreitung in Berlin
    content: >
      <p>
      Die Meldungen aus Berlin konzentrieren sich bisher auf die südlichen
      und südöstlichen Stadtbezirke, also die Bereiche mit direkter Anbindung
      an die Brandenburger Population. Aus Tempelhof-Schöneberg, Neukölln,
      Treptow-Köpenick und Steglitz-Zehlendorf liegen die meisten Nachweise
      vor. Ob die Art bereits die nördlichen Stadtteile erreicht hat, ist
      noch unklar. Genau hier sind Ihre Beobachtungen gefragt.
      </p>

  - heading: Urbane Lebensräume
    content: >
      <p>
      In Berlin nutzt die Gottesanbeterin ein breites Spektrum an Lebensräumen:
      sonnige Gärten und Hinterhöfe, Kleingärtenanlagen, Friedhöfe mit
      extensiver Pflege, Brachflächen und Bahndämme. Entscheidend ist eine
      offene, sonnige Struktur mit niedriger bis mittelhoher Vegetation.
      Dicht bewachsene oder stark beschattete Flächen werden gemieden.
      Besonders die vielen Berliner Brachflächen, die sich auf ehemaligen
      Industrie- und Bahngeländen entwickelt haben, bieten mit ihren
      trockenwarmen Standorten gute Bedingungen.
      </p>

  - heading: Erkennung und Verwechslung
    content: >
      <p>
      Die Gottesanbeterin fällt durch ihre aufrechte Haltung und die typischen
      Fangbeine auf, die sie vor dem Körper hält. In der Stadt wird sie
      gelegentlich mit großen Heuschrecken verwechselt, etwa der Grünen
      Strandschrecke oder dem Grünen Heupferd. Der Unterschied ist leicht
      zu erkennen: Nur die Gottesanbeterin besitzt die bedornten Fangbeine
      und den auffällig dreieckigen, beweglichen Kopf. Unser
      <a href="/bestimmung" class="text-green-700 hover:underline">Bestimmungsschlüssel</a>
      zeigt die Unterschiede im Detail.
      </p>

  - heading: Sichtung melden
    content: >
      <p>
      Jede Meldung aus Berlin hilft, die urbane Ausbreitung der
      Gottesanbeterin zu dokumentieren. Ob auf dem Balkon, im Kleingarten
      oder auf einer Brachfläche: Fotografieren Sie das Tier und melden
      Sie Ihren Fund. Auch Ootheken an Hauswänden, Zaunpfählen oder
      Pflanzenstängeln sind wichtige Nachweise.
      </p>

