{# Shared image preview modal — include from any page that needs image lightbox.
   Provides: <dialog id="imageModal"> markup.
   Requires: theme.css dialog styles (.modal-image) and JS handlers
             (openImageModal/closeImageModal/openImageNewTab). #}
<dialog id="imageModal" class="modal-image"
    aria-label="Bildvorschau"
    title="Um das Bild weiter zu vergrößern klicken sie auf den Button unten">
    <div class="overflow-hidden w-full px-4 pt-5 pb-4 text-left bg-white rounded-lg shadow-xl sm:p-6">
        <div class="flex justify-center mt-2">
            <img loading="lazy" id="modalImage" class="w-full max-h-[70vh] object-contain" src="" alt="Full Image View">
        </div>
        <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
            <button type="button" onclick="closeImageModal()"
                class="btn-green mb-2 w-full px-4 py-2 sm:mb-0 sm:ml-3 sm:w-auto sm:text-sm"
                title="Schließen Sie das Fenster">
                Close
            </button>
            <button type="button" onclick="openImageNewTab()"
                class="btn-green mb-2 w-full px-4 py-2 sm:mb-0 sm:ml-3 sm:w-auto sm:text-sm"
                title="Öffnen Sie das Bild in einem neuen Tab">
                <svg class="w-[16px] h-[16px] text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 18 18">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 11v4.833A1.166 1.166 0 0 1 13.833 17H2.167A1.167 1.167 0 0 1 1 15.833V4.167A1.166 1.166 0 0 1 2.167 3h4.618m4.447-2H17v5.768M9.111 8.889l7.778-7.778" />
                </svg>
            </button>
        </div>
    </div>
</dialog>
