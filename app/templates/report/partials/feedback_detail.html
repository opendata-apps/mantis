{# HTMX partial: Feedback detail field #}
{% if show %}
<div id="feedback_detail_container" class="form-group">
  <label for="feedback_detail" class="block text-sm font-medium text-gray-700 mb-1">Details (optional)</label>
  <input type="text" id="feedback_detail" name="feedback_detail"
         placeholder="{{ placeholder }}" autocomplete="off" maxlength="255"
         class="block w-full px-4 py-2 text-base text-gray-700 bg-white rounded-lg shadow-xs border border-gray-300 focus:outline-hidden focus:ring-2 focus:ring-green-500 focus:border-transparent hover:bg-gray-200 transition ease-in-out duration-300">
</div>
{% else %}
<div id="feedback_detail_container" class="hidden">
  <input type="hidden" name="feedback_detail" value="">
</div>
{% endif %}
