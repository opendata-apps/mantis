{% macro MenuFilter() -%}
<script type="module" src="{{ vite_asset('js/htmx.js') }}"></script>

<div class="flex flex-wrap bg-gray-200">
	<div
		class="flex items-center justify-center pt-5 text-sm font-medium text-gray-900 bg-gray-200 border border-gray-200 focus:z-10 focus:ring-4 focus:ring-gray-200">
		<div
			class="flex mx-4 text-sm font-medium text-gray-900 bg-white bg-gray-200 border border-gray-200 rounded-lg focus:z-10 focus:ring-4 focus:ring-gray-200">
			<input type="hidden" id="usertId" name="userId" value="{{session['user_id']}}" class="rounded-lg">
			<select id="stats" name="stats" class="rounded-lg" onchange="this.form.submit()">
				{% for statistik in menu.items() %}
				<option value="{{ statistik[0] }}" {% if statistik[0]==marker %} selected="selected" {% endif %}>
					{{ statistik[1] }}
				</option>
				{% endfor %}
			</select>
		</div>
		<p class="m-4">Fuer den Zeitraum vom {{session['date_from']}} bis {{session['date_to']}}.</p>
		<p class="m-4">Gebietskennzahl: {{session['ags']}}</p>
	</div>
</div>

{%- endmacro %}
