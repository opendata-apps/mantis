{% macro StatsAuswahl() -%}
  <div class="w-full">
    <div id="filterDropdown"
         class="p-4 space-y-4 bg-white rounded-lg border border-gray-200">
      <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
        <div>
          <label for="dateFrom" class="block mb-1 text-sm font-semibold text-gray-700">Funddatum von</label>
          <input type="date"
                 id="dateFrom"
                 name="dateFrom"
                 value="{{ session["date_from"] }}"
                 class="block px-3 py-2 w-full text-sm text-gray-700 bg-white rounded-lg border border-gray-300 transition-all duration-200 focus:outline-hidden focus-visible:border-green-500 focus-visible:ring-2 focus-visible:ring-green-500/30">
        </div>
        <div>
          <label for="dateTo" class="block mb-1 text-sm font-semibold text-gray-700">Funddatum bis</label>
          <input type="date"
                 id="dateTo"
                 name="dateTo"
                 value="{{ session["date_to"] }}"
                 class="block px-3 py-2 w-full text-sm text-gray-700 bg-white rounded-lg border border-gray-300 transition-all duration-200 focus:outline-hidden focus-visible:border-green-500 focus-visible:ring-2 focus-visible:ring-green-500/30">
        </div>
      </div>
      <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
        <div>
          <label for="ags_input"
                 class="block mb-1 text-sm font-semibold text-gray-700">Gebiet</label>
          <input type="text"
                 name="ags_input"
                 id="ags_input"
                 autocomplete="off"
                 hx-get="/statistik/ags"
                 hx-trigger="keyup changed delay:300ms"
                 hx-target="#vorschlaege"
                 hx-swap="innerHTML"
                 class="block px-3 py-2 w-full text-sm text-gray-700 bg-white rounded-lg border border-gray-300 transition-all duration-200 focus:outline-hidden focus-visible:border-green-500 focus-visible:ring-2 focus-visible:ring-green-500/30">
        </div>
        <div>
          <label for="ags" class="block mb-1 text-sm font-semibold text-gray-700">AGS</label>
          <input type="text"
                 value="{{ session["ags"] }}"
                 name="ags"
                 id="ags"
                 class="block px-3 py-2 w-full text-sm text-gray-700 bg-white rounded-lg border border-gray-300 transition-all duration-200 focus:outline-hidden focus-visible:border-green-500 focus-visible:ring-2 focus-visible:ring-green-500/30">
        </div>
      </div>
      <div class="flex flex-col gap-3 items-start sm:flex-row sm:items-center sm:justify-between">
        <button type="submit" class="btn-green px-4 py-2 w-full sm:w-auto">Auswahl aktualisieren</button>
        <ul id="vorschlaege" class="overflow-auto w-full max-h-40 text-sm">
        </ul>
      </div>
    </div>
  </div>
{%- endmacro %}
